<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="5" fill="#0d1117"/>

  <!-- Monitor casing -->
  <rect x="2" y="2" width="28" height="21" rx="3" fill="#21262d"/>
  <rect x="2" y="2" width="28" height="21" rx="3" fill="none" stroke="#39ff14" stroke-width="1.2"/>

  <!-- Screen glass (dark inset) -->
  <rect x="5" y="5" width="22" height="15" rx="1.5" fill="#060a0e"/>

  <!-- Subtle scanline overlay bands -->
  <rect x="5" y="5"  width="22" height="2" fill="#39ff14" opacity="0.03"/>
  <rect x="5" y="9"  width="22" height="2" fill="#39ff14" opacity="0.03"/>
  <rect x="5" y="13" width="22" height="2" fill="#39ff14" opacity="0.03"/>
  <rect x="5" y="17" width="22" height="2" fill="#39ff14" opacity="0.03"/>

  <!-- Green phosphor text lines -->
  <rect x="7" y="8"  width="14" height="1.8" rx="0.9" fill="#39ff14" opacity="0.95"/>
  <rect x="7" y="12" width="10" height="1.8" rx="0.9" fill="#39ff14" opacity="0.75"/>
  <rect x="7" y="16" width="6"  height="1.8" rx="0.9" fill="#39ff14" opacity="0.85"/>

  <!-- Blinking cursor block -->
  <rect x="14" y="16" width="2.2" height="1.8" rx="0.3" fill="#39ff14"/>

  <!-- Power LED -->
  <circle cx="26.5" cy="20.5" r="1.3" fill="#39ff14" opacity="0.9"/>

  <!-- Monitor neck -->
  <rect x="13" y="23" width="6" height="2" rx="0.5" fill="#30363d"/>

  <!-- Base -->
  <rect x="8" y="25" width="16" height="5" rx="2" fill="#21262d"/>
  <rect x="8" y="25" width="16" height="5" rx="2" fill="none" stroke="#30363d" stroke-width="1"/>
</svg>
