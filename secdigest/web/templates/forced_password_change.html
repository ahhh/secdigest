{% extends "base.html" %}
{% block title %}SecDigest — Set Password{% endblock %}
{% block content %}

<div style="max-width:480px;margin:60px auto;">
  <div class="form-card">
    <h1 class="page-title" style="margin-bottom:8px;">Set a new password</h1>
    <p class="page-sub" style="margin-bottom:20px;">
      You're using the default password. Please set a new one before continuing.
    </p>

    {% if error %}
    <div class="notice notice-error" style="margin-bottom:16px;">
      <div class="notice-headline">{{ error }}</div>
    </div>
    {% endif %}

    <form action="/forced-password-change" method="post">
      {{ csrf_input(request) }}
      <div class="form-group">
        <label class="label">New password (min 8 chars)</label>
        <input type="password" name="new_password" class="input" required minlength="8"
               autocomplete="new-password" autofocus>
      </div>
      <div class="form-group">
        <label class="label">Confirm new password</label>
        <input type="password" name="confirm_password" class="input" required minlength="8"
               autocomplete="new-password">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;">Update password</button>
    </form>
  </div>
</div>

{% endblock %}
