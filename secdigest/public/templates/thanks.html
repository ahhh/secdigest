<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Trailhead // check your inbox</title>
  <link rel="stylesheet" href="/static/style.css">
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
</head>
<body>
  <header class="topbar">
    <svg class="mark" viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <path d="M3 20 L9 8 L13 15 L16 10 L21 20 Z" fill="currentColor"/>
      <path d="M9 8 L11 11 L9.6 12.4 L8 10 Z" fill="#f6f1e6"/>
    </svg>
    <span class="brand">Trailhead</span>
    <span class="topbar-meta">confirm pending</span>
  </header>

  <main class="hero narrow">
    <span class="kicker">Almost there</span>
    <h1>Check your inbox.</h1>
    <p class="lead">
      We sent a confirm link to <strong class="hl">{{ email }}</strong>.
      Click it and you're on the crew. No click, no emails &mdash; that's the deal.
    </p>
    <p class="fineprint">
      Didn't show up? Check spam, or wait a couple minutes and try again.
    </p>
    <p class="back"><a href="/" class="link-back">&larr; back to base camp</a></p>
  </main>
</body>
</html>
