<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>secdigest // confirm pending</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="scanlines" aria-hidden="true"></div>
  <div class="grid-bg" aria-hidden="true"></div>

  <header class="topbar">
    <span class="prompt">&gt;</span>
    <span class="brand">secdigest<span class="cursor">_</span></span>
    <span class="topbar-meta">// confirm pending</span>
  </header>

  <main class="hero narrow">
    <h1>check your inbox.</h1>
    <p class="lead">
      we sent a confirm link to <strong class="hl">{{ email }}</strong>.
      click it and you're in. no click, no emails &mdash; that's the deal.
    </p>
    <p class="fineprint">
      didn't show up? check spam, or wait a couple minutes and try again.
    </p>
    <p class="back"><a href="/" class="link-back">&lt; back</a></p>
  </main>
</body>
</html>
