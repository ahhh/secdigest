<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Trailhead // unsubscribed</title>
  <link rel="stylesheet" href="/static/style.css">
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
</head>
<body>
  <header class="topbar">
    <svg class="mark" viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <path d="M3 20 L9 8 L13 15 L16 10 L21 20 Z" fill="currentColor"/>

    <span class="brand">Trailhead</span>
    <span class="topbar-meta">off the list</span>

  <main class="hero narrow">
    <span class="kicker">Trail's end</span>
    <h1>You're off the list.</h1>
    <p class="lead">{{ message }}</p>
    <p class="back"><a href="/" class="link-back">&larr; back to base camp</a></p>
  </main>
</body>
</html>
