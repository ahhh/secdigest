<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Rounded badge, warm paper over pine -->
  <rect width="32" height="32" rx="7" fill="#1d3b2e"/>

  <!-- Sky wash inside the badge -->
  <rect x="3" y="3" width="26" height="26" rx="5" fill="#dcebe6"/>

  <!-- Sun -->
  <circle cx="22" cy="11" r="3.2" fill="#d2814a"/>

  <!-- Back ridge (moss) -->
  <path d="M3 24 L11 13 L16 19 L21 12 L29 24 Z" fill="#7ba588"/>

  <!-- Front peak (pine) with snowcap -->
  <path d="M3 26 L12 11 L21 26 Z" fill="#2f5d46"/>
  <path d="M12 11 L14.4 15 L12 16.8 L9.6 14.2 Z" fill="#f6f1e6"/>

  <!-- Ground line -->
  <rect x="3" y="24.5" width="26" height="2.2" fill="#5b4a37"/>
  <rect x="3" y="3" width="26" height="26" rx="5" fill="none" stroke="#1d3b2e" stroke-width="0.6" opacity="0.4"/>
</svg>
